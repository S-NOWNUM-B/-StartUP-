<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рабочее пространство</title>
    <link rel="stylesheet" href="/CSS/WorkSpace.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <div class="header">
        <a href="/incert.html">
            <button class="logo">
                NoizeHub
            </button>
        </a>
    </div>
    <div class="main">
        <div class="task-section">
            <div class="task-header">
                <div class="task-title">
                    Задача
                </div>
                <div class="task-actions">
                    <button>
                        <i class="fas fa-plus"></i>Добавить задание</button>
                </div>
            </div>
            <ul class="task-list">
                <li>
                    <i class="fas fa-check-circle"></i>
                    <div class="completed-tasks">
                        <i class="fas fa-check"></i>Выполненные задачи <span class="count">0</span>
                    </div>
                </li>
            </ul>
        </div>
    </div>
    <div class="footer">
        <div class="logo">NoizeHub</div>
        <p>
            Твои дела – твой контроль. Создавай списки и делитесь ими мгновенно.
        </p>
    </div>
</body>
</html>
